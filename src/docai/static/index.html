<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocAI — распознавание счетов и накладных</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<div class="max-w-3xl mx-auto px-4 py-12">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold bg-gradient-to-r from-sky-400 to-emerald-400 bg-clip-text text-transparent">DocAI</h1>
    <p class="mt-3 text-slate-400">Сфотографируйте счёт — получите данные в Excel. Русский и казахский языки.</p>
  </header>

  <!-- Upload zone -->
  <div id="dropzone"
       class="border-2 border-dashed border-slate-700 hover:border-sky-500 rounded-2xl p-10 text-center cursor-pointer transition">
    <p class="text-lg">📄 Перетащите файл или нажмите для выбора</p>
    <p class="text-sm text-slate-500 mt-2">JPG, PNG, PDF · до 15 МБ</p>
    <input id="fileInput" type="file" accept="image/*,.pdf" class="hidden">
  </div>

  <div id="status" class="mt-6 text-center text-slate-400 hidden"></div>

  <!-- Result -->
  <div id="result" class="mt-8 hidden">
    <div class="bg-slate-900 rounded-2xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Результат</h2>
        <span id="docType" class="text-sm px-3 py-1 rounded-full bg-sky-900 text-sky-300"></span>
      </div>
      <div id="issues" class="mb-4 space-y-2"></div>
      <table class="w-full text-sm">
        <tbody id="fields" class="divide-y divide-slate-800"></tbody>
      </table>
      <div id="items" class="mt-4"></div>
    </div>
    <div class="mt-6 flex gap-4 justify-center">
      <a href="/api/export.xlsx"
         class="px-6 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 font-medium transition">⬇ Скачать Excel</a>
      <button onclick="location.reload()"
         class="px-6 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 font-medium transition">Ещё документ</button>
    </div>
  </div>

</div>

<script>
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');
const statusEl = document.getElementById('status');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('border-sky-500'); });
dz.addEventListener('dragleave', () => dz.classList.remove('border-sky-500'));
dz.addEventListener('drop', e => { e.preventDefault(); handle(e.dataTransfer.files[0]); });
fi.addEventListener('change', () => handle(fi.files[0]));

const LABELS = {
  doc_number: 'Номер', doc_date: 'Дата', supplier_name: 'Поставщик',
  supplier_bin: 'БИН поставщика', buyer_name: 'Покупатель', buyer_bin: 'БИН покупателя',
  subtotal: 'Подытог', vat_amount: 'НДС', total: 'Итого', currency: 'Валюта'
};

async function handle(file) {
  if (!file) return;
  statusEl.textContent = '⏳ Распознаём документ…';
  statusEl.classList.remove('hidden');
  dz.classList.add('opacity-50', 'pointer-events-none');

  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/api/extract', { method: 'POST', body: fd });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Ошибка сервера');
    render(data);
  } catch (e) {
    statusEl.textContent = '❌ ' + e.message;
    dz.classList.remove('opacity-50', 'pointer-events-none');
  }
}

function render(data) {
  statusEl.classList.add('hidden');
  dz.classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('docType').textContent = data.invoice.doc_type;

  const issuesEl = document.getElementById('issues');
  issuesEl.innerHTML = '';
  for (const iss of data.issues) {
    const div = document.createElement('div');
    const isErr = iss.severity === 'error';
    div.className = 'text-sm px-3 py-2 rounded-lg ' +
      (isErr ? 'bg-red-950 text-red-300' : 'bg-amber-950 text-amber-300');
    div.textContent = (isErr ? '⛔ ' : '⚠️ ') + iss.message;
    issuesEl.appendChild(div);
  }

  const fieldsEl = document.getElementById('fields');
  fieldsEl.innerHTML = '';
  for (const [key, label] of Object.entries(LABELS)) {
    const val = data.invoice[key];
    if (val === null || val === undefined || val === '') continue;
    const conf = data.invoice.confidence[key];
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="py-2 text-slate-400">${label}</td>
      <td class="py-2 text-right font-medium">${val}${conf !== undefined && conf < 0.8 ? ' ⚠️' : ''}</td>`;
    fieldsEl.appendChild(tr);
  }

  const items = data.invoice.line_items || [];
  if (items.length) {
    let html = '<h3 class="text-sm text-slate-400 mb-2">Позиции</h3><table class="w-full text-sm"><tbody class="divide-y divide-slate-800">';
    for (const li of items) {
      html += `<tr><td class="py-1">${li.name}</td><td class="py-1 text-right">${li.quantity ?? ''} ${li.unit ?? ''}</td><td class="py-1 text-right font-medium">${li.total}</td></tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('items').innerHTML = html;
  }
}
</script>
</body>
</html>
